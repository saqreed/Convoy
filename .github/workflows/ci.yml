name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convoy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d convoy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/convoy?schema=public
      JWT_SECRET: please_change_me_to_a_long_random_secret_key_32chars_min
      PORT: 3000
      WS_TTL_SECONDS: 120
      WS_MIN_PING_INTERVAL_MS: 3000
      OSRM_BASE_URL: https://router.project-osrm.org
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate
      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Typecheck
        working-directory: backend
        run: npm run lint
      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000/ws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose file
        run: docker compose config
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: docker build ./frontend
