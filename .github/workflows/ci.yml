name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convoy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d convoy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/convoy?schema=public
      JWT_SECRET: please_change_me_to_a_long_random_secret_key_32chars_min
      PORT: 3000
      WS_TTL_SECONDS: 120
      WS_MIN_PING_INTERVAL_MS: 3000
      OSRM_BASE_URL: https://router.project-osrm.org
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npm run prisma:generate
      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Typecheck
        working-directory: backend
        run: npm run lint
      - name: Build
        working-directory: backend
        run: npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000/ws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose file
        run: docker compose config
      - name: Build backend image
        run: docker build ./backend
      - name: Build frontend image
        run: docker build ./frontend

  smoke:
    name: Compose Smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build
      - name: Check health endpoints
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:3000/health && curl -fsS http://localhost:5173/health; then
              exit 0
            fi
            docker compose ps
            sleep 2
          done
          docker compose logs --no-color
          exit 1
      - name: Stop stack
        if: always()
        run: docker compose down -v

  publish-images:
    name: Publish Images
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push backend image
        run: |
          IMAGE_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build \
            -t "$IMAGE_NAMESPACE/backend:${GITHUB_SHA}" \
            -t "$IMAGE_NAMESPACE/backend:latest" \
            ./backend
          docker push "$IMAGE_NAMESPACE/backend:${GITHUB_SHA}"
          docker push "$IMAGE_NAMESPACE/backend:latest"
      - name: Build and push frontend image
        run: |
          IMAGE_NAMESPACE="ghcr.io/${GITHUB_REPOSITORY,,}"
          docker build \
            -t "$IMAGE_NAMESPACE/frontend:${GITHUB_SHA}" \
            -t "$IMAGE_NAMESPACE/frontend:latest" \
            ./frontend
          docker push "$IMAGE_NAMESPACE/frontend:${GITHUB_SHA}"
          docker push "$IMAGE_NAMESPACE/frontend:latest"
